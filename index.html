<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Rubberhope</title>
	<style>
		body {
			background-color: #FFF4DC;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
		}
		.image-wrapper {
			position: relative;
			display: inline-block;
		}
		.static-bg {
			display: block;
			max-width: 100%;
			height: auto;
		}
		.logo-link {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
		}
		.logo-link::after {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background-color: white;
			opacity: 0;
			transition: opacity 0.2s ease-in-out;
		}
		.logo-link:hover::after {
			opacity: 0.4; /* Change this (between 0.1 and 1.0) to make the white fade stronger or softer */
		}
		.logo-overlay {
			display: block;
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
	<div class="image-wrapper">
		<img src="background-text.png" alt="Click to enter" class="static-bg">
		<a href="https://797682-45.myshopify.com/" class="logo-link">
			<img src="logo.png" alt="Rubberhope Logo" class="logo-overlay">
		</a>
	</div>
</body>
</html>
