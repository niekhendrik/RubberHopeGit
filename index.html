<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Rubberhope</title>
	<link rel="icon" type="image/png" href="favicon.png">
	<style>
		body {
			background-color: #FFF4DC;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
		}
		.image-wrapper {
			position: relative;
			display: inline-block;
		}
		.static-bg {
			display: block;
			max-width: 100%;
			height: auto;
		}
		.logo-link {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
		}
		.logo-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
		}
		/* The initial red logo */
		.logo-overlay.red {
			opacity: 1;
		}
		/* The new blue logo (hidden by default) */
		.logo-overlay.blue {
			opacity: 0;
		}

		/* When hovering the link, flip the opacity */
		.logo-link:hover .logo-overlay.red {
			opacity: 0;
		}
		.logo-link:hover .logo-overlay.blue {
			opacity: 1;
		}

	</style>
</head>
<body>
	<div class="image-wrapper">
		<img src="background-text.png" alt="Click to enter" class="static-bg">
		<a href="https://797682-45.myshopify.com/" class="logo-link">
			<!-- Stack the red logo first -->
			<img src="logo.png" alt="Rubberhope Logo" class="logo-overlay red">
			<!-- Stack the blue logo second -->
			<img src="logo-hover.png" alt="Rubberhope Logo Hover" class="logo-overlay blue">
		</a>
	</div>
</body>
</html>
